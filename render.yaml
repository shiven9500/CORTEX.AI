services:
  - type: web
    name: cortex-ai-backend
    env: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        value: sqlite:///./cortex.db
      - key: FRONTEND_URL
        # We will add this later in the Render Dashboard once Vercel is deployed
        value: ""
